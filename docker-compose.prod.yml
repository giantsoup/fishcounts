services:
  app:
    restart: unless-stopped
    volumes:
      - storage-data:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "php artisan about --only=environment >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3

  queue:
    restart: unless-stopped
    volumes:
      - storage-data:/app/storage

  scheduler:
    restart: unless-stopped
    volumes:
      - storage-data:/app/storage

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

volumes:
  storage-data:
